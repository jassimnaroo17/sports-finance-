<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Finance</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <nav>
      <h1>SportFinanceX</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Analytics</a></li>
        <li><a href="#">Teams</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="hero">
      <h2>The Future of Sports Finance</h2>
      <p>Track athlete wealth, club valuation, sponsorships, and sports investments.</p>

      <button>Explore Market</button>
      <button class="secondary">Get Started</button>

  <section class="stats">

      <h3>$12B</h3>

      <h3>$900M</h3>
      <p>Athlete Investments</p>
    </div>
  </section>

  <section class="chart-section">
    <h2>Revenue Analytics</h2>

    <canvas id="financeChart"></canvas>
  </section>

  <script src="script.js"></script>
